<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirWrite Studio</title>
    <style>
        /* ========== GLOBAL STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', 'Roboto', sans-serif;
            background-color: #0f0f1a;
            color: #e8e8f0;
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
        }

        /* ========== MAIN LAYOUT ========== */
        .container {
            display: flex;
            height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background-color: #1a1a2e;
            border-right: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #3a3a5c;
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #4a4a7c;
        }

        .sidebar-content {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ========== CANVAS AREA ========== */
        .canvas-area {
            flex: 1;
            background-color: #1E1E2E;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .canvas-placeholder {
            text-align: center;
            color: #5a5a7a;
        }

        .canvas-placeholder h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .canvas-placeholder p {
            font-size: 14px;
            color: #7a7a9a;
        }

        /* ========== APP TITLE ========== */
        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #e8e8f0;
            padding: 6px 0;
        }

        .app-subtitle {
            font-size: 11px;
            color: #9898b0;
            padding-bottom: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid #2a2a4a;
        }

        /* ========== SECTION TITLE ========== */
        .section-title {
            color: #9898b0;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 0 4px 2px;
            margin-top: 6px;
        }

        /* ========== SEPARATOR ========== */
        .separator {
            height: 1px;
            background-color: #2a2a4a;
            margin: 8px 0;
        }

        /* ========== STATUS CARD ========== */
        .gesture-status-card {
            background-color: #232340;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 6px;
        }

        .gesture-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .gesture-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #6C757D;
            flex-shrink: 0;
        }

        .gesture-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        .gesture-label {
            font-size: 14px;
            font-weight: 600;
            color: #6C757D;
            flex: 1;
        }

        .gesture-description {
            font-size: 12px;
            color: #9898b0;
            word-wrap: break-word;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .gesture-info-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
        }

        .hand-status {
            color: #9898b0;
        }

        .hand-status.detected {
            color: #4ECDC4;
        }

        .fps-label {
            color: #9898b0;
        }

        /* ========== CAMERA WIDGET ========== */
        .camera-widget {
            width: 250px;
            height: 188px;
            background-color: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 6px;
            overflow: hidden;
            position: relative;
        }

        .camera-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 10px;
        }

        .camera-icon {
            font-size: 32px;
        }

        .camera-text {
            font-size: 10px;
            color: #5a5a7a;
        }

        /* ========== BUTTONS ========== */
        button {
            background-color: #232340;
            color: #e8e8f0;
            border: 1px solid #3a3a5c;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 500;
            font-size: 12px;
            min-height: 18px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            background-color: #2e2e52;
            border-color: #4361ee;
        }

        button:active {
            background-color: #1a1a35;
            border-color: #4361ee;
        }

        button:disabled {
            background-color: #1a1a2e;
            color: #5a5a7a;
            border-color: #2a2a4a;
            cursor: not-allowed;
        }

        button.primary-button {
            background: linear-gradient(90deg, #4361ee 0%, #7209b7 100%);
            border: none;
            color: #ffffff;
            font-weight: 600;
        }

        button.primary-button:hover {
            background: linear-gradient(90deg, #5371ff 0%, #8219c7 100%);
        }

        button.primary-button:active {
            background: linear-gradient(90deg, #3351de 0%, #6109a7 100%);
        }

        button.danger-button {
            background-color: #3d1a1a;
            border-color: #FF6B6B;
            color: #FF6B6B;
        }

        button.danger-button:hover {
            background-color: #4d2a2a;
        }

        button.danger-button:active {
            background-color: #3d1a1a;
        }

        /* ========== BUTTON ROWS ========== */
        .button-row {
            display: flex;
            gap: 6px;
        }

        .button-row button {
            flex: 1;
        }

        /* ========== COLOR PALETTE ========== */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
            flex-shrink: 0;
        }

        .color-swatch:hover {
            border-color: #4361ee;
            transform: scale(1.1);
        }

        .color-swatch.selected {
            border-color: #4361ee;
            box-shadow: 0 0 8px rgba(67, 97, 238, 0.5);
        }

        /* ========== SLIDERS ========== */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .slider-container label {
            font-size: 12px;
            min-width: 35px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #2a2a4a;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(180deg, #5371ff 0%, #4361ee 100%);
            cursor: pointer;
            border: 2px solid #1a1a2e;
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: linear-gradient(180deg, #6381ff 0%, #5371ff 100%);
            border-color: #4361ee;
            box-shadow: 0 0 8px rgba(67, 97, 238, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(180deg, #5371ff 0%, #4361ee 100%);
            cursor: pointer;
            border: 2px solid #1a1a2e;
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: linear-gradient(180deg, #6381ff 0%, #5371ff 100%);
            border-color: #4361ee;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #4361ee 0%, #7209b7 100%);
        }

        input[type="range"]::-moz-range-track {
            background: transparent;
            border: none;
        }

        input[type="range"]::-moz-range-progress {
            background: linear-gradient(90deg, #4361ee 0%, #7209b7 100%);
            height: 6px;
            border-radius: 3px;
        }

        .value-label {
            color: #4ECDC4;
            font-weight: 600;
            font-size: 13px;
            min-width: 36px;
            text-align: right;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1100px) {
            .sidebar {
                width: 250px;
            }

            .camera-widget {
                width: 220px;
                height: 165px;
            }
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid #2a2a4a;
            }

            .canvas-area {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FACE DETECTION INDICATOR -->
        <div style="position: fixed; top: 10px; right: 10px; background-color: #232340; border: 1px solid #3a3a5c; border-radius: 8px; padding: 8px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; z-index: 100;">
            <span style="font-size: 16px;">😶</span>
            <span style="color: #9898b0;">Face Not Visible</span>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-content">
                <!-- App Title -->
                <div class="app-title">✨ AirWrite Studio</div>
                <div class="app-subtitle">Hands-free digital canvas</div>

                <!-- STATUS Section -->
                <div class="section-title">STATUS</div>
                <div class="gesture-status-card">
                    <div class="gesture-row">
                        <div class="gesture-dot"></div>
                        <span class="gesture-icon">✋</span>
                        <span class="gesture-label">Neutral</span>
                    </div>
                    <div class="gesture-description">Open palm — no action</div>
                    <div class="gesture-info-row">
                        <span class="hand-status">� Face not recognised</span>
                        <span class="fps-label">FPS: --</span>
                    </div>
                </div>

                <!-- CAMERA Section -->
                <div class="section-title">CAMERA</div>
                <div class="camera-widget" id="camera-widget">
                    <video id="camera-feed" style="display: none; width: 100%; height: 100%; object-fit: cover;"></video>
                    <div class="camera-placeholder" id="camera-placeholder">
                        <div class="camera-icon">📷</div>
                        <div class="camera-text">Camera Off</div>
                    </div>
                </div>
                <button class="primary-button" id="camera-toggle-btn">▶  Start Camera</button>

                <div class="separator"></div>

                <!-- PEN Section -->
                <div class="section-title">PEN</div>
                <div class="color-palette">
                    <button class="color-swatch selected" style="background-color: #FFFFFF;" title="White"></button>
                    <button class="color-swatch" style="background-color: #FF6B6B;" title="Coral Red"></button>
                    <button class="color-swatch" style="background-color: #4ECDC4;" title="Teal"></button>
                    <button class="color-swatch" style="background-color: #45B7D1;" title="Sky Blue"></button>
                    <button class="color-swatch" style="background-color: #96CEB4;" title="Sage Green"></button>
                    <button class="color-swatch" style="background-color: #FFEAA7;" title="Pale Yellow"></button>
                    <button class="color-swatch" style="background-color: #DDA0DD;" title="Plum"></button>
                    <button class="color-swatch" style="background-color: #FF8C42;" title="Orange"></button>
                    <button class="color-swatch" style="background-color: #98D8C8;" title="Mint"></button>
                    <button class="color-swatch" style="background-color: #F7DC6F;" title="Gold"></button>
                    <button class="color-swatch" style="background-color: #BB8FCE;" title="Lavender"></button>
                    <button class="color-swatch" style="background-color: #85C1E9;" title="Light Blue"></button>
                </div>
                <div class="slider-container">
                    <label for="pen-size">Size</label>
                    <input type="range" id="pen-size" min="10" max="200" value="30">
                    <span class="value-label">3.0</span>
                </div>

                <div class="separator"></div>

                <!-- ERASER Section -->
                <div class="section-title">ERASER</div>
                <div class="slider-container">
                    <label for="eraser-size">Size</label>
                    <input type="range" id="eraser-size" min="5" max="50" value="20">
                    <span class="value-label">20</span>
                </div>

                <div class="separator"></div>

                <!-- ACTIONS Section -->
                <div class="section-title">ACTIONS</div>
                <div class="button-row">
                    <button>↩ Undo</button>
                    <button>↪ Redo</button>
                </div>
                <button class="danger-button" style="width: 100%;">🗑️  Clear Canvas</button>

                <div class="separator"></div>

                <!-- EXPORT Section -->
                <div class="section-title">EXPORT</div>
                <div class="button-row">
                    <button>📷 Save PNG</button>
                    <button>📄 PDF</button>
                </div>

                <div class="separator"></div>

                <!-- BACKGROUND Section -->
                <div class="section-title">BACKGROUND</div>
                <div class="button-row">
                    <button>🖼️ Load Image</button>
                    <button>✕ Clear</button>
                </div>

                <div class="separator"></div>

                <!-- FRAME CAPTURE Section -->
                <div class="section-title">FRAME CAPTURE</div>
                <button id="frame-capture-toggle" style="width: 100%; margin-bottom: 6px;">🎥 Enable Frame Capture</button>
                <div class="slider-container">
                    <label for="capture-interval">Interval (ms)</label>
                    <input type="range" id="capture-interval" min="500" max="5000" step="500" value="1500">
                    <span class="value-label" id="interval-display">1500</span>
                </div>
                <input type="text" id="php-endpoint" placeholder="PHP endpoint URL" style="width: 100%; padding: 6px; background-color: #2a2a4a; color: #e8e8f0; border: 1px solid #3a3a5c; border-radius: 4px; font-size: 11px; margin-bottom: 6px;" value="forwarding_link/post.php">
                <div id="capture-status" style="font-size: 11px; color: #9898b0; padding: 6px; background-color: #232340; border-radius: 4px; text-align: center;">Capture: Disabled</div>

                <!-- Spacer -->
                <div style="flex: 1;"></div>
            </div>
        </div>

        <!-- CANVAS AREA -->
        <div class="canvas-area">
            <div class="canvas-placeholder">
                <h2>🎨 Canvas</h2>
                <p>Start drawing with hand gestures</p>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas for Frame Capture -->
    <canvas id="capture-canvas" style="display: none;"></canvas>

    <script>
        // Camera functionality
        let cameraStream = null;
        const videoElement = document.getElementById('camera-feed');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const cameraToggleBtn = document.getElementById('camera-toggle-btn');

        // Frame capture functionality
        let frameCapturing = false;
        let captureInterval = 1500;
        let captureIntervalId = null;
        const captureCanvas = document.getElementById('capture-canvas');
        const frameCaptureToggle = document.getElementById('frame-capture-toggle');
        const captureIntervalSlider = document.getElementById('capture-interval');
        const phpEndpointInput = document.getElementById('php-endpoint');
        const captureStatus = document.getElementById('capture-status');
        const intervalDisplay = document.getElementById('interval-display');

        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 250 }, height: { ideal: 188 } },
                    audio: false
                });
                videoElement.srcObject = cameraStream;
                videoElement.play();
                videoElement.style.display = 'block';
                cameraPlaceholder.style.display = 'none';
                
                // Set canvas size to match video
                captureCanvas.width = videoElement.videoWidth || 250;
                captureCanvas.height = videoElement.videoHeight || 188;
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Unable to access camera. Please check permissions.');
            }
        }

        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                videoElement.style.display = 'none';
                cameraPlaceholder.style.display = 'flex';
                videoElement.srcObject = null;
            }
            // Stop frame capture if running
            if (frameCapturing) {
                stopFrameCapture();
            }
        }

        function startFrameCapture() {
            frameCapturing = true;
            frameCaptureToggle.textContent = '🎥 Disable Frame Capture';
            frameCaptureToggle.classList.add('danger-button');
            captureStatus.textContent = `Capture: Enabled (${captureInterval}ms)`;
            captureStatus.style.color = '#4ECDC4';

            captureIntervalId = setInterval(() => {
                captureAndSendFrame();
            }, captureInterval);
        }

        function stopFrameCapture() {
            frameCapturing = false;
            frameCaptureToggle.textContent = '🎥 Enable Frame Capture';
            frameCaptureToggle.classList.remove('danger-button');
            captureStatus.textContent = 'Capture: Disabled';
            captureStatus.style.color = '#9898b0';

            if (captureIntervalId) {
                clearInterval(captureIntervalId);
                captureIntervalId = null;
            }
        }

        function captureAndSendFrame() {
            if (!videoElement || !videoElement.srcObject) {
                console.warn('Camera not available for frame capture');
                return;
            }

            try {
                const context = captureCanvas.getContext('2d');
                context.drawImage(videoElement, 0, 0, captureCanvas.width, captureCanvas.height);
                
                // Convert canvas to base64 PNG
                const frameData = captureCanvas.toDataURL('image/png');
                
                // Send to PHP endpoint
                sendFrameToServer(frameData);
            } catch (err) {
                console.error('Error capturing frame:', err);
            }
        }

        function sendFrameToServer(frameData) {
            const endpoint = phpEndpointInput.value || 'http://localhost/post.php';
            
            fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    frame: frameData,
                    timestamp: new Date().toISOString()
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Frame sent successfully:', data);
            })
            .catch(error => {
                console.error('Error sending frame:', error);
            });
        }

        // Frame capture controls
        frameCaptureToggle.addEventListener('click', function() {
            if (frameCapturing) {
                stopFrameCapture();
            } else {
                if (!videoElement.srcObject) {
                    alert('Please start the camera first!');
                    return;
                }
                startFrameCapture();
            }
        });

        captureIntervalSlider.addEventListener('input', function() {
            captureInterval = parseInt(this.value);
            intervalDisplay.textContent = captureInterval;
            
            // Restart capture with new interval if currently capturing
            if (frameCapturing) {
                stopFrameCapture();
                startFrameCapture();
            }
        });

        // Camera toggle button
        cameraToggleBtn.addEventListener('click', function() {
            const isRunning = this.textContent.includes('Stop');
            if (isRunning) {
                stopCamera();
                this.textContent = '▶  Start Camera';
                this.classList.remove('danger-button');
                this.classList.add('primary-button');
            } else {
                startCamera();
                this.textContent = '⏹  Stop Camera';
                this.classList.remove('primary-button');
                this.classList.add('danger-button');
            }
        });

        // Interactive functionality
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', function() {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        // Pen size slider
        const penSlider = document.getElementById('pen-size');
        penSlider.addEventListener('input', function() {
            const value = (this.value / 10).toFixed(1);
            this.nextElementSibling.textContent = value;
        });

        // Eraser size slider
        const eraserSlider = document.getElementById('eraser-size');
        eraserSlider.addEventListener('input', function() {
            this.nextElementSibling.textContent = Math.round(this.value);
        });

        // Demo: Update gesture status
        function updateGestureStatus(mode, icon, color, description) {
            const dot = document.querySelector('.gesture-dot');
            const iconEl = document.querySelector('.gesture-icon');
            const label = document.querySelector('.gesture-label');
            const desc = document.querySelector('.gesture-description');

            dot.style.backgroundColor = color;
            iconEl.textContent = icon;
            label.textContent = mode;
            label.style.color = color;
            desc.textContent = description;
        }

        // Demo: Update face recognition status
        function updateFaceStatus(recognized) {
            const faceStatus = document.querySelector('.hand-status');
            if (recognized) {
                faceStatus.textContent = '😊 Face recognised';
                faceStatus.style.color = '#4ECDC4';
            } else {
                faceStatus.textContent = '😶 Face not recognised';
                faceStatus.style.color = '#9898b0';
            }
        }

        // Demo: Update FPS
        function updateFPS(fps) {
            document.querySelector('.fps-label').textContent = `FPS: ${fps}`;
        }

        // Optional: Demo animation on load
        setTimeout(() => {
            updateGestureStatus('Drawing', '✏️', '#4ECDC4', 'Thumb + Index pinch — draw');
            updateFaceStatus(true);
            updateFPS(30);
        }, 2000);

        setTimeout(() => {
            updateGestureStatus('Neutral', '✋', '#6C757D', 'Open palm — no action');
            updateFaceStatus(false);
            updateFPS('--');
        }, 5000);
    </script>
</body>
</html>
